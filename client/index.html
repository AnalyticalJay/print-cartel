<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Print Cartel - Custom DTF Printing Order Platform</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Design, preview, and order custom-printed apparel with Print Cartel. Premium quality DTF printing for your brand. Fast turnaround, easy ordering." />
    <meta name="keywords" content="custom DTF printing, direct-to-film printing, custom apparel, t-shirt printing, custom clothing, bulk orders, print on demand" />
    <meta name="author" content="Print Cartel" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph Tags for Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Print Cartel - Custom DTF Printing Order Platform" />
    <meta property="og:description" content="Design, preview, and order custom-printed apparel with Print Cartel. Premium quality DTF printing for your brand." />
    <meta property="og:url" content="https://printcartel.co.za" />
    <meta property="og:image" content="https://printcartel.co.za/og-image.jpg" />
    <meta property="og:site_name" content="Print Cartel" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Print Cartel - Custom DTF Printing" />
    <meta name="twitter:description" content="Design, preview, and order custom-printed apparel with Print Cartel. Premium quality DTF printing." />
    <meta name="twitter:image" content="https://printcartel.co.za/og-image.jpg" />
    
    <!-- Canonical URL -->
    <meta property="canonical" content="https://printcartel.co.za" />
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-50RL55NVZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-50RL55NVZ2');
    </script>

    <!-- Google Fonts: Fredoka One (graffiti-style) and Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
